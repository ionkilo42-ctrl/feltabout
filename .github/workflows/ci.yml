name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-test:
    name: API tests
    runs-on: ubuntu-latest
    env:
      AI_PROVIDER: local
      DATABASE_URL: sqlite+aiosqlite:///:memory:
      OPENAI_API_KEY: ""
      USE_AUTH: "false"
      ENCRYPTION_KEY: nY1jcI7NI5vxhAXu7r_MT4h84trDxTcf6dzWTqtlSUU=

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: services/api/requirements.txt

      - name: Install API dependencies
        run: pip install -r services/api/requirements.txt

      - name: Run API tests
        run: python -m pytest services/api/tests -q

  frontend-build:
    name: Web build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm build

  mobile-typecheck:
    name: Mobile typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Install mobile dependencies
        run: npm ci

      - name: Typecheck mobile app
        run: npm run typecheck

      - name: Typecheck shared package
        run: ./node_modules/.bin/tsc --noEmit -p ../../packages/shared/tsconfig.json

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [api-test, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: ./services/api
          file: ./services/api/Dockerfile
          push: false
          tags: feltabout/api:test

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: feltabout/frontend:test
