# ─────────────────────────────────────────────────────────────────────────────
# Feltabout — docker-compose for local MVP development
# ─────────────────────────────────────────────────────────────────────────────
# Usage:
#   cp services/api/.env.example services/api/.env
#   docker compose up         # starts all services
#   docker compose logs -f    # tail backend logs
#
# For production, replace `build:` with `image:` and set image tags in CI.
# ─────────────────────────────────────────────────────────────────────────────

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: feltabout
      POSTGRES_USER: feltabout
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-prod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U feltabout -d feltabout"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./services/api/.env
    environment:
      # Override DATABASE_URL to point to the postgres service
      DATABASE_URL: postgresql+asyncpg://feltabout:${POSTGRES_PASSWORD:-change-me-in-prod}@postgres:5432/feltabout
      USE_AUTH: "true"
      ENABLE_MVP2_BACKEND_BRIDGE: "false"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
    driver: local
