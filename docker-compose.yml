# ─────────────────────────────────────────────────────────────────────────────
# RelateFX — docker-compose for local development and staging
# ─────────────────────────────────────────────────────────────────────────────
# Usage:
#   cp .env.template .env     # fill in your API keys
#   docker compose up         # starts all services
#   docker compose logs -f    # tail backend logs
#
# For production, replace `build:` with `image:` and set image tags in CI.
# ─────────────────────────────────────────────────────────────────────────────

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: relatefx
      POSTGRES_USER: relatefx
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-prod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relatefx"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Override DATABASE_URL to point to the postgres service
      DATABASE_URL: postgresql+asyncpg://relatefx:${POSTGRES_PASSWORD:-change-me-in-prod}@postgres:5432/relatefx
      USE_POSTGRES: "true"
      # Ports for LiveKit / Deepgram / ElevenLabs come from .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local