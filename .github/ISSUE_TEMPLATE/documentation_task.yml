name: Documentation task
description: Request or propose documentation improvements
title: "[Docs] "
labels:
  - documentation
body:
  - type: textarea
    id: gap
    attributes:
      label: Documentation gap
      description: What is unclear, missing, outdated, or misleading?
    validations:
      required: true
  - type: textarea
    id: audience
    attributes:
      label: Intended audience
      description: Who is blocked by this docs issue?
      placeholder: contributors, self-hosters, reviewers, OSS evaluators
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
      description: If you know the exact file or section, include it here.
